name: nhl-arenas-api-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Step 1: Run unit tests for coverage report
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        cd backend
        retry() {
          local attempts=$1
          shift
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "Command failed after $n attempts: $*"
              return 1
            fi
            echo "Attempt $n failed. Retrying in 5s..."
            n=$((n + 1))
            sleep 5
          done
        }

        python -m pip install --upgrade pip
        retry 3 pip install --retries 10 --timeout 60 --disable-pip-version-check -e ".[dev]"
        retry 3 pip install --retries 10 --timeout 60 --disable-pip-version-check pytest pytest-cov pytest-asyncio
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --cov=app
    
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./backend/coverage.xml

  # Step 2: Build and push the Docker image (main only — PRs skip; Dependabot has no registry secrets)
  build:
    name: "Build and Push Docker Image"
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    concurrency:
      group: docker-build-main
      cancel-in-progress: false
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # Tag shape: v<pyproject version>.<UTC date>.<nth build today>, e.g. v0.1.0.2026-05-20.3
    # Daily counter resets at UTC midnight; counts main-branch runs of this workflow (incl. this run).
    - name: Compute Docker image version tag
      id: docker_meta
      working-directory: backend
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')
        BUILD_DATE=$(date -u +%Y-%m-%d)
        RUNS_TODAY=$(gh api \
          "repos/${GITHUB_REPOSITORY}/actions/workflows/backend-ci.yml/runs?branch=main&per_page=100" \
          --jq "[.workflow_runs[] | select(.created_at | startswith(\"${BUILD_DATE}\"))] | length")
        IMAGE_TAG="v${VERSION}.${BUILD_DATE}.${RUNS_TODAY}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
        echo "daily_build_number=${RUNS_TODAY}" >> "$GITHUB_OUTPUT"
        echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "Docker image tag: ${IMAGE_TAG} (build ${RUNS_TODAY} on ${BUILD_DATE} UTC)"

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/nhl-arenas-api:latest
          ${{ secrets.DOCKER_USERNAME }}/nhl-arenas-api:${{ steps.docker_meta.outputs.image_tag }}

  # Deploy: run .github/workflows/backend-cd.yml manually with the image_tag from this job's logs.

