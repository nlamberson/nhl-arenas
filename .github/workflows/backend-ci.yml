name: nhl-arenas-api-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Step 1: Run unit tests for coverage report
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        cd backend
        retry() {
          local attempts=$1
          shift
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "Command failed after $n attempts: $*"
              return 1
            fi
            echo "Attempt $n failed. Retrying in 5s..."
            n=$((n + 1))
            sleep 5
          done
        }

        python -m pip install --upgrade pip
        retry 3 pip install --retries 10 --timeout 60 --disable-pip-version-check -e ".[dev]"
        retry 3 pip install --retries 10 --timeout 60 --disable-pip-version-check pytest pytest-cov pytest-asyncio
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --cov=app
    
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./backend/coverage.xml

  # Step 2: Build and push the Docker image
  build:
    needs: test  # Only build if tests pass
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # Tag shape: v<pyproject version>.<UTC date>.<run_number>, e.g. v0.1.0.2026-04-13.42
    # run_number is monotonic for this workflow (not reset at midnight). For a strict
    # "nth build today" counter, add a step that queries the GitHub API for runs on the current date.
    - name: Compute Docker image version tag
      id: docker_meta
      working-directory: backend
      env:
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')
        BUILD_DATE=$(date -u +%Y-%m-%d)
        IMAGE_TAG="v${VERSION}.${BUILD_DATE}.${RUN_NUMBER}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
        echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "Docker image tag: ${IMAGE_TAG}"

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/nhl-arenas-api:latest
          ${{ secrets.DOCKER_USERNAME }}/nhl-arenas-api:${{ steps.docker_meta.outputs.image_tag }}

  # Step 3: Deploy to <TBD>
  # Could be broken out into deployment action later on, 
  #   might make this just a build step

