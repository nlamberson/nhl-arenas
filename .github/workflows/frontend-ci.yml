name: nhl-arenas-web-build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'render.yaml'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'render.yaml'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-web:
    name: "Typecheck and build web export"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static web export
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_PUBLIC_API_URL:-}" ]; then
            echo "::warning::EXPO_PUBLIC_API_URL secret not set — using CI placeholder."
            export EXPO_PUBLIC_API_URL="http://localhost:8000"
          fi
          if [ -z "${EXPO_PUBLIC_FIREBASE_API_KEY:-}" ]; then
            echo "::warning::EXPO_PUBLIC_FIREBASE_API_KEY secret not set — using CI placeholder."
            export EXPO_PUBLIC_FIREBASE_API_KEY="ci-build-placeholder"
          fi
          npm run build:web

      - name: Verify SPA redirect rules are in dist
        run: test -f dist/_redirects

      - name: Upload web dist artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 7

  # Deploy: run .github/workflows/frontend-cd.yml manually after a green build on main.
