name: nhl-arenas-ios-release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (preview = TestFlight/internal, production = App Store)'
        required: true
        type: choice
        options:
          - preview
          - production
      use_eas_build:
        description: 'Run EAS cloud build (requires EXPO_TOKEN secret and eas init)'
        required: true
        type: boolean
        default: false
      submit_to_app_store:
        description: 'After EAS build, submit to App Store Connect (requires ASC credentials in EAS)'
        required: true
        type: boolean
        default: false

jobs:
  validate:
    name: "Validate frontend (typecheck + web build)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static web export (sanity check)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
        run: |
          set -euo pipefail
          export EXPO_PUBLIC_API_URL="${EXPO_PUBLIC_API_URL:-http://localhost:8000}"
          export EXPO_PUBLIC_FIREBASE_API_KEY="${EXPO_PUBLIC_FIREBASE_API_KEY:-ci-build-placeholder}"
          npm run build:web

  eas-build:
    name: "EAS iOS build (${{ inputs.profile }})"
    needs: validate
    if: inputs.use_eas_build
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS project is linked
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Run 'eas login' locally, then create a token:"
            echo "       https://expo.dev/accounts/[account]/settings/access-tokens"
            exit 1
          fi
          # TODO: Run `eas init` locally once to link this app and add extra.eas.projectId to app.json
          if ! grep -q '"projectId"' app.json 2>/dev/null; then
            echo "::warning::app.json may not have extra.eas.projectId — run 'eas init' in frontend/ if EAS build fails."
          fi

      - name: EAS Build (iOS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_PUBLIC_API_URL:-}" ] || [ -z "${EXPO_PUBLIC_FIREBASE_API_KEY:-}" ]; then
            echo "::error::EXPO_PUBLIC_API_URL and EXPO_PUBLIC_FIREBASE_API_KEY must be set for iOS production builds."
            exit 1
          fi
          eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive

      - name: EAS Submit to App Store Connect
        if: inputs.submit_to_app_store
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          # TODO: Configure submit.production.ios in eas.json (appleId, ascAppId) or via EAS credentials
          eas submit --platform ios --profile production --latest --non-interactive

  local-release-notes:
    name: "Local iOS release checklist"
    needs: validate
    if: ${{ !inputs.use_eas_build }}
    runs-on: ubuntu-latest
    steps:
      - name: Print local build instructions
        run: |
          cat <<'EOF'
          EAS cloud build skipped. To release iOS locally on a Mac:

          1. TODO: Update ios.bundleIdentifier in frontend/app.json (currently com.example.nhlarenas)
          2. TODO: Set production env in frontend/.env or shell:
                 EXPO_PUBLIC_API_URL=https://YOUR-API.onrender.com
                 EXPO_PUBLIC_FIREBASE_API_KEY=your-firebase-web-api-key
          3. cd frontend && npm ci
          4. npx expo prebuild --platform ios
          5. Open ios/*.xcworkspace in Xcode
          6. Product → Archive → Distribute App → App Store Connect / TestFlight

          Optional: use `eas submit` after a local archive, or re-run this workflow with use_eas_build=true.
          EOF
