name: nhl-arenas-web-deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production web deploy'
        required: true
        type: string

# One production web deploy at a time; do not cancel an in-flight deploy.
concurrency:
  group: production-web-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy static site to Render"
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Confirm deploy intent
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "deploy" ]; then
            echo "::error::Confirmation failed. Re-run and type \"deploy\" in the confirm field."
            exit 1
          fi

      - name: Deploy to Render Static Site
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::error::RENDER_FRONTEND_DEPLOY_HOOK_URL is not set (repo or production environment secret)."
            exit 1
          fi

          echo "Triggering Render static site rebuild from connected Git branch..."

          HTTP_CODE=$(curl -sS -o /tmp/render-frontend-response.txt -w "%{http_code}" -X POST "$DEPLOY_HOOK")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Render deploy hook returned HTTP ${HTTP_CODE}"
            cat /tmp/render-frontend-response.txt
            exit 1
          fi

          cat /tmp/render-frontend-response.txt
          echo "Render frontend deploy triggered successfully."
          echo ""
