name: nhl-arenas-api-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to deploy (from CI build, e.g. v0.1.0.2026-05-20.3)"
        required: true
        type: string

# One production deploy at a time; do not cancel an in-flight deploy.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Docker Image to Render"
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Reject latest tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ "$IMAGE_TAG" = "latest" ]; then
            echo "::error::Deploying 'latest' is not allowed. Pick an immutable tag from a CI build."
            exit 1
          fi

      - name: Validate tag format
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if ! echo "$IMAGE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]{4}-[0-9]{2}-[0-9]{2}\.[0-9]+$'; then
            echo "::warning::Tag does not match CI format vX.Y.Z.YYYY-MM-DD.N — verify before deploying."
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Verify image exists on Docker Hub
        env:
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/nhl-arenas-api:${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          # Metadata-only check (no layer download). Exits non-zero if tag is missing or inaccessible.
          docker manifest inspect "$IMAGE"

      - name: Deploy to Render
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL is not set (repo or production environment secret)."
            exit 1
          fi

          IMG_PATH="docker.io/${DOCKER_USERNAME}/nhl-arenas-api:${IMAGE_TAG}"
          IMG_URL_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${IMG_PATH}', safe=''))")

          if [[ "$DEPLOY_HOOK" == *'?'* ]]; then
            DEPLOY_URL="${DEPLOY_HOOK}&imgURL=${IMG_URL_ENCODED}"
          else
            DEPLOY_URL="${DEPLOY_HOOK}?imgURL=${IMG_URL_ENCODED}"
          fi

          echo "Deploying ${IMG_PATH}"

          HTTP_CODE=$(curl -sS -o /tmp/render-response.txt -w "%{http_code}" -X POST "$DEPLOY_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Render deploy hook returned HTTP ${HTTP_CODE}"
            cat /tmp/render-response.txt
            exit 1
          fi

          cat /tmp/render-response.txt
          echo "Render deploy triggered successfully."
